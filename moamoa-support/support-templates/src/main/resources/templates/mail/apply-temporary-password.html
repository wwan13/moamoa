<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>임시 비밀번호 안내</title>

    <style>
        @font-face {
            font-family: 'Pretendard';
            font-style: normal;
            font-weight: 400;
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Regular.woff2') format('woff2'),
            url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff/Pretendard-Regular.woff') format('woff');
        }

        @font-face {
            font-family: 'Pretendard';
            font-style: normal;
            font-weight: 700;
            src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff2/Pretendard-Bold.woff2') format('woff2'),
            url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/woff/Pretendard-Bold.woff') format('woff');
        }

        body, td, div, p, span, a {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont,
            'Segoe UI', Roboto, Helvetica, Arial, sans-serif !important;
        }
    </style>
</head>
<body style="margin:0; padding:0; background-color:#ffffff; font-family:Arial, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="background-color:#ffffff; margin:0; padding:0;">
    <tr>
        <td align="center" style="padding:60px 40px;">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="max-width:360px;">
                <tr>
                    <td align="center" style="padding-bottom:40px;">
                        <!-- 로고 이미지를 쓸 경우 -->
                        <img src="https://i.imgur.com/CHYokw0.png" alt="moamoa" width="122px"
                             style="display:block; border:0;"/>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="background-color:#ffffff; padding:0;">
                        <div style="font-size:28px; line-height:1; font-weight:600; color:#252525;">
                            임시 비밀번호 안내
                        </div>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding-top:20px;">
                        <div style="font-size:14px; line-height:1.5; color:#717680; letter-spacing:-0.02em;">
                            임시로 변경된 비밀번호입니다.<br/>
                            로그인 후 마이페이지에서 반드시 비밀번호를 변경해주세요!
                        </div>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding:40px 0;">
                        <div style="font-size:28px; font-weight:600; color:#0E4BBC; text-decoration:underline; word-break:break-all;">
                            <span th:text="${password}">password</span>
                        </div>
                    </td>
                </tr>

                <tr>
                    <td align="center" bgcolor="#0E4BBC" style="border-radius:10px;">
                        <a href="https://moamoa.dev/login"
                           style="display:block; width:360px; color:#ffffff; text-decoration:none; font-size:14px; font-weight:500; line-height:14px; padding:13px 0px;">
                            로그인 하러가기
                        </a>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
